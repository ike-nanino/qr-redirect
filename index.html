<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Redirect</title>

<script>

// Converts a date + time in a specific timezone into a UTC timestamp
function convertToUTC(date, hour, minute, timeZone) {

  // Step 1: Create a Date object in UTC first
  const utcDate = new Date(date + "T00:00:00Z");

  // Step 2: Format that date as if it exists inside the chosen timezone
  const formatter = new Intl.DateTimeFormat("en-US", {
    timeZone: timeZone,
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour12: false
  });

  const parts = formatter.formatToParts(utcDate);

  const year = parts.find(p => p.type === "year").value;
  const month = parts.find(p => p.type === "month").value;
  const day = parts.find(p => p.type === "day").value;

  // Step 3: Build full date-time string
  const finalDate = new Date(
    `${year}-${month}-${day}T${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}:00`
  );

  // Step 4: Return UTC timestamp
  return finalDate.getTime();
}


function redirectUser() {

  // Current real-world time in UTC (same everywhere on earth)
  const nowUTC = Date.now();

  const schedule = [
    {
      date: "2026-03-02",
      hour: 12,
      minute: 10,
      timezone: "America/Chicago", // GLOBAL timezone with DST support
      link: "https://www.flightaware.com/live/flight/EDV5210/history/20260303/1315Z/KHSV/KLGA"
    },
    {
      date: "2026-03-03",
      hour: 16,
      minute: 25,
      timezone: "America/New_York",
      link: "https://www.flightaware.com/live/flight/DAL156/history/20260303/2135Z/KJFK/DGAA"
    }
  ];

  let selectedLink = null;

  for (let i = schedule.length - 1; i >= 0; i--) {

    const eventUTC = convertToUTC(
      schedule[i].date,
      schedule[i].hour,
      schedule[i].minute,
      schedule[i].timezone
    );

    if (nowUTC >= eventUTC) {
      selectedLink = schedule[i].link;
      break;
    }
  }

  if (selectedLink) {
    window.location.href = selectedLink;
  } else {
    document.body.innerHTML = `
      <h2>This QR code is not active yet.</h2>
      <p>Please scan again later.</p>
    `;
  }
}

window.onload = redirectUser;

</script>
</head>

<body>
<h2>Checking schedule...</h2>
</body>
</html>
