<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Redirect</title>

<script>

// Convert a date + time in a timezone into UTC timestamp
function convertToUTC(date, hour, minute, timeZone) {

  const utcDate = new Date(date + "T00:00:00Z");

  const formatter = new Intl.DateTimeFormat("en-US", {
    timeZone: timeZone,
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour12: false
  });

  const parts = formatter.formatToParts(utcDate);

  const year = parts.find(p => p.type === "year").value;
  const month = parts.find(p => p.type === "month").value;
  const day = parts.find(p => p.type === "day").value;

  const finalDate = new Date(
    `${year}-${month}-${day}T${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}:00`
  );

  return finalDate.getTime();
}


function redirectUser() {

  const nowUTC = Date.now();

  const schedule = [

    // First flight link becomes active at 12:00 PM CST
    {
      date: "2026-03-04",
      hour: 12,
      minute: 0,
      timezone: "America/Chicago",
      link: "https://www.flightaware.com/live/flight/UCA4340/history/20260306/1920Z/KHSV/KIAD"
    },

    // Second flight link becomes active after first flight ends (4:13 PM EST)
    {
      date: "2026-03-06",
      hour: 16,
      minute: 14,
      timezone: "America/New_York",
      link: "https://www.flightaware.com/live/flight/UAL996/history/20260306/2350Z/KIAD/DGAA"
    }

  ];

  let selectedLink = null;

  for (let i = schedule.length - 1; i >= 0; i--) {

    const eventUTC = convertToUTC(
      schedule[i].date,
      schedule[i].hour,
      schedule[i].minute,
      schedule[i].timezone
    );

    if (nowUTC >= eventUTC) {
      selectedLink = schedule[i].link;
      break;
    }
  }

  if (selectedLink) {

    window.location.href = selectedLink;

  } else {

    document.body.innerHTML = `
      <h2>This QR code is not active yet.</h2>
      <p>Please scan again later.</p>
    `;

  }

}

window.onload = redirectUser;

</script>
</head>

<body>

<h2>Checking schedule...</h2>

</body>
</html>
